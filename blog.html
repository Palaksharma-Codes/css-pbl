<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #0f172a , #1e293b);
        }
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        .blog {
            flex: 3;
        }
        .post {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .sidebar {
            flex: 1;
            background: white;
            padding: 15px;
            height: fit-content;
            border-radius: 10px;
        }
        .h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="blog">
            <div class="post">
                <h2>My Coding Journey</h2>
                <p>Starting From Zero And Building Everyday!</p>
            </div>
            <div class="post">
                <h2>Why I Love CSS</h2>
                <p>Designing Makes Coding Fun Snd Creative</p>
            </div>
        </div>
        <div class="sidebar">
            <h3>About Me</h3>
            <p>Futue Full-Stack Developer</p>
            <h3>Categories</h3>
            <p>Coding</p>
            <p>Design</p>
        </div>
    </div>
</body>
</html>
