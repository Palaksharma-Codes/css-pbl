<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
        }
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #0f172a;
            color: white;
            padding-top: 20px;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .main {
            flex: 1;
            padding: 30px;
            background: #f1f5f9;
        }
        .card {
            background: #FFFACD;
            padding: 20px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Palak</h2>
        <a href="#">Dashboard</a>
        <a href="#">Projects</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </div>
    <div class="main">
        <h1>Welcome Back</h1>
        <div class="card">This is your dashboard content area</div>
    </div>
</body>
</html>
