<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .navbar {
            background: #0f172a;
            padding: 15px;
            text-align: center;
        }
        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .hero {
            height: 100vh;
            background: linear-gradient(to right,#0f172a,#1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .section {
            padding: 50px;
            text-align: center;
            background: #f1f5f9;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .card {
            background: #38bdf8;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
        }
        .footer {
            background-color: #0f172a;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
    <div class="hero">
        <div>
            <h1>Hi, I'm Palak</h1>
            <p>Future Full Stack Developer</p>
        </div>
    </div>
    <div class="section">
        <div class="container">
            <div class="card">Web Design</div>
            <div class="card">Frontend</div>
            <div class="card">learning</div>
        </div>
    </div>
    <div class="footer">
        <p>@ 2026 Palak</p>
    </div>
</body>
</html>
