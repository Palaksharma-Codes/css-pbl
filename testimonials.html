<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #d2d7ff;
            text-align: center;
        }
        .section {
            padding: 50px;
        }
        .container {
                        display: flex;
                        justify-content: center;
                        gap: 20px;
        }
        .card {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        .card p {
            font-style: italic;
        }
        .name {
            font-weight: bold;
            color: #9999ff;
        }
    </style>
</head>
<body>
    <div class="section">
        <h2>What People Say About Us</h2>
        <div class="container">
            <div class="card">
                <p>"Amazing work and dedication"</p>
                <div class="name">User1</div>
            </div>
            <div class="card">
                <p>"Learning journey is inspiring"</p>
                <div class="name">User2</div>
            </div>
            <div class="card">
                <p>"Future developer right here!"</p>
                <div class="name">User3</div>
            </div>
        </div>
    </div>
</body>
</html>
