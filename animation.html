<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
</head>
<style>
    body {
        background-color: #0f172a;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        padding: 50px;
    }
    .btn{
        background-color: #38bdf8;
        padding: 12px 20px;
        margin: 10px;
        border: none;
        color: black;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn:hover{
        transform: scale(1.1);
        background-color: #0ea5e9;
    }
    .card {
        background-color: white;
        color: black;
        width: 200px;
        padding: 20px;
        margin: 20px auto;
        border-radius: 12px;
        transition: 0.3s;
        }
        .card:hover{
            transform: translateY(-10px);
            box-shadow: 0px 8px 10px rgba(0,0,0,0.3);
        }
</style>
<body>
    <h2>My Interactive UI</h2>
    <button class="btn">Click Me</button>
    <button class="btn">Hover Me</button>
    <div class="card">
        <h3>My Card</h3>
        <p>Hover me to see magic!</p>
    </div>
</body>
</html>
