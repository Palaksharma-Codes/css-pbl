<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Card</title>
</head>
<style>
    body {
        background-color:plum;
        font-family:Georgia, 'Times New Roman', Times, serif;
    }
    .card {
        background-color:snow;
        margin:100px auto;
        padding: 20px;
        width:300px;
        text-align: center;
    }
    h1 {
        color:darkolivegreen;
    }
    p {
        color:brown;
    }
    img {
        width:250px;
        border-radius: 10px;
    }
</style>
<body>
    <div class="card">
        <h1>Palak Sharma</h1>
        <p>Future Web Developer</p>
        <p>One Step Towards Success Everyday!</p>
        <img src="My-image.jpeg">
    </div>
</body>
</html>
