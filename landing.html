<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #0f172a;
            color: white;
        }
        .menu a {
            margin-left: 15px;
            color: white;
            text-decoration: none;
        }
        .hero {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(to right,#0f172a,#1e293b);
            color: white;
        }
        .btn {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        .section {
            padding: 50px;
            text-align: center;
            background: #d2d7ff;
        }
        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .card {
            background: white;
            width: 200px;
            padding: 20px;
            border-radius: 10px;
        }
        .footer {
            background: #0f172a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        @media (max-width: 700px){
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>Palak</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Contact</a>
        </div>
    </div>
    <div class="hero">
        <h2>Build My Dream Website</h2>
        <p>Learning and growing everyday!</p>
        <button class="btn">Get Started</button>
    </div>
    <div class="section">
        <h2>Features</h2>
        <div class="container">
            <div class="card">Web Development</div>
            <div class="card">Logic Building</div>
            <div class="card">Critical Thinking</div>
        </div>
    </div>
    <div class="footer">
        <p>@ 2026 | Palak</p>
    </div>
</body>
</html>
