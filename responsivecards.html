<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive card</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background-color: #d8bfd8;
    }
    .section {
        padding: 50px;
        text-align: center;
    }
    .container {
        display: flex;
        gap: 20px;
        justify-content: center;
    }
    .card {
        background-color: white;
        width: 200px;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        color: #6f446f;
    }
    @media(max-width:600px) {
        .container {
            flex-direction: column;
            align-items: center;
        }
    }
    h2 {
        color: white;
        font-size: 30px;
    }
    .card:hover {
        transform: scale(1.05);
    }
</style>
<body>
    <div class="section">
        <h2>My Skills</h2>
        <div class="container">
            <div class="card">
                <h3>HTML</h3>
                <p>Building Structure</p>
            </div>
            <div class="card">
                <h3>CSS</h3>
                <p>Designing Websites</p>
            </div>
            <div class="card">
                <h3>Learning</h3>
                <p>Growing Every Single Day</p>
            </div>
        </div>
    </div>
</body>
</html>
