<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f5f9;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
            filter: brightness(80%);
        }
    </style>
</head>
<body>
    <h2>My Gallery</h2>
    <div class="gallery">
        <img src="./Images/galleryimg1.jpg">
        <img src="./Images/galleryimg2.jpg">
        <img src="./Images/galleryimg3.jpg">
        <img src="./Images/galleryimg4.jpg">
    </div>
</body>
</html>
