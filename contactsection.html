<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Section UI</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f5f9;
        }
        .section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            gap: 30px;
        }
        .form-box {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 10px;
        }
        input,textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        textarea {
            resize: none;
            height: 80px;
        }
        button {
           width: 100%;
           padding: 10px;
           background: #38bdf8;
           border: none;
           border-radius: 8px;
           cursor: pointer;
        }
        button:hover {
            background: #0ea5e9;
        }
        .info {
            max-width: 250px;
        }
        @media(max-width:700px) {
            .section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
        <div class="section">
            <div class="form-box">
                <h2>Contact Me</h2>
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your email">
                <textarea placeholder="Your Message"></textarea>
                <button>Send Message</button>
            </div>
        </div> 
        <div class="info">
            <h3>Let's Connect</h3>
            <p>I am building my coding journey.Reach out anytime!</p>
        </div>
</body>
</html>
