<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f5f9;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit , minimax(180px,1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .img {
            width: 300px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        .price {
            color: green;
            margin: 10px 0;
        }
        button {
            padding: 8px 12px;
            border: none;
            background: #38bdf8;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #0ea5e9;
        }
        @media(max-width:700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h2>My Products</h2>
    <div class="grid">
        <div class="card">
            <img src="product 1.jpg">
            <h3>SKIN1004 Madagascar Centella Tone Brightening Ampoule</h3>
            <p clas="price">$20</p>
            <button>Buy Now</button>
        </div>
        <div class="card">
            <img src="product 2.jpg">
            <h3>Fairy Skin Premium Tinted Sunscreen</h3>
            <p class="price">$25</p>
            <button>Buy Now</button>
        </div>
        <div class="card">
            <img src="product 3.jpg">
            <h3>Cetaphil Moisturizing Lotion for combination/sensitive skin</h3>
            <p class="price">$30</p>
            <button>Buy Now</button>
        </div>
    </div>
</body>
</html>
