<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
</head>
<style>
    body {
        margin: 0;
        font-family:Arial, Helvetica, sans-serif;
    }
    .navbar {
        background-color: #0f172a;
        padding: 15px;
        text-align: center;
        position: fixed;
        width: 100%;
    }
    .navbar a {
        color: white;
        margin: 0px 15px;
        text-decoration: none;
    }
    .hero {
        height: 100vh;
        background:linear-gradient(to right,#0f172a,#1e293b);

        color: white;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .about {
        padding: 50px;
        text-align: center;
        background-color: #f1f5f9;
    }
    .footer {
        background-color: #0f172a;
        color: white;
        text-align: center;
        padding: 20px;
    }
    .navbar a:hover {
        color: #38bdf8;
    }
</style>
<body>
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
    <div class="hero">
        <div>
            <h1>Hi, I'm Palak</h1>
            <p>Future Full-Stack Developer</p>
        </div>
    </div>
    <div class="about">
        <h2>About Me</h2>
        <p>I learning coding from scratch to build my own website</p>
    </div>
    <div class="footer">
        <p>Created by Palak | 10th April 2026</p>
    </div>

</html>
