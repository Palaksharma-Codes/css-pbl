<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .btn {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        #modal {
            display: none;
        }
        #modal:target {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: 100px auto;
            border-radius: 10px;
            animation: pop 0.3s ease;
        }
        .close {
            display: block;
            color: red;
            text-decoration: none;
            margin-top: 10px;
        }
        @keyframes pop {
            from{transform: scale(0.5);}
            to{transform: scale(1);}
        }
    </style>
</head>
<body>
    <a href="#modal" class="btn">Open Popup</a>
    <div id="modal">
        <div class="modal-box">
            <h2>Hello</h2>
            <p>This is a CSS Popup!</p>
            <a href="#" class="close">close</a>
        </div>
    </div>
</body>
</html>
