<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #0f172a;
        padding: 15px 20px;
        color: white;
    }
    .logo {
        font-size: 24px;
        font-weight: bold;
    }
    .menu {
        display: flex;
        gap: 15px;
    }
    .menu a {
        color: white;
        text-decoration: none;
    }
    .menu a:hover {
        color: #38bdf8;
    }
    @media(max-width:600px) {
        .menu {
            flex-direction: column;
            text-align: center;
            margin-top: 10px;
        }
        .navbar {
            flex-direction: column;
        }
    }
</style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Palak</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>
    </div>
</body>
</html>
