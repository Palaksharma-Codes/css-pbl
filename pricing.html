<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
</head>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: palegoldenrod;
        text-align: center;
    }
    .section {
        padding: 50px;
    }
    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    .card {
        background-color: white;
        padding: 20px;
        width: 220px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    .card h3 {
        margin-bottom: 10px;
    }
    .price {
        font-size: 24px;
        margin: 10px 0;
    }
    .btn {
        background-color: #38bdf8;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
    }
    highlight {
        border: 2px solid #38bdf8;
        transform: scale(1.05);
    }
    .card:hover{
        transform: translateY(-10px);
    }
</style>
<body>
    <div class="section">
        <h2>Pricing Plans</h2>
        <div class="container">
            <div class="card">
                <h3>Basic</h3>
                <p class="price">$10</p>
                <p>Good for beginners</p>
                <button class="btn">Choose</button>
            </div>
            <div class="card">
                <h3>Pro</h3>
                <p class="price">$20</p>
                <p>Best for learners</p>
                <button class="btn">Choose</button>
            </div>
            <div class="card">
                <h3>Premium</h3>
                <p class="price">$30</p>
                <p>Advanced features</p>
                <button class="btn">Choose</button>
            </div>
        </div>
    </div>
</body>
</html>
