<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f1f5f9;
            padding: 40px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            gap: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .number {
            font-size: 35px;
            font-weight: bold;
            color: #38bdf8;
        }
        .label {
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <h2>My Progress</h2>
    <div class="container">
        <div class="card">
            <div class="number">20</div>
            <div class="label">Projects Completed</div>
        </div>
        <div class="card">
            <div class="number">50+</div>
            <div class="label">Hours Completed</div>
        </div>
        <div class="card">
            <div class="number">100%</div>
            <div class="label">Consistency</div>
        </div>
        <div class="card">
            <div class="number">Infinity</div>
            <div class="label">Learning Mindset</div>
        </div>
    </div>
</body>
</html>
