<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #d2d7ff;
            padding: 50px;
        }
        .faq {
            max-width: 500px;
            margin: auto;
        }
        details {
            background: white;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        summary {
            cursor: pointer;
            font-weight: bold;
        }
        details[open] {
            background: #e0f2fe;
        }
    </style>
</head>
<body>
    <div class="faq">
        <h2>FAQs</h2>
        <details>
            <summary>What are you learning?</summary>
            <p>I am web development from scratch</p>
        </details>
        <details>
            <summary>How long does it take?</summary>
            <p>With consistency,around 6-12 months</p>
        </details>
        <details>
            <summary>Why coding?</summary>
            <p>To build my dream life</p>
        </details>
    </div>
</body>
</html>
