<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>
</head>
<style>
    body {
        font-family: Arial,sans-serif;
        background-color: #0f172a;
        margin: 0;
    }
    .section {
        padding: 50px;
        text-align: center;
    }
    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    .card {
        background-color: transparent;
        border: 2px solid white;
        color: white;
        padding: 20px;
        width: 200px;
        border-radius: 20px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
        margin-bottom: 30px;
        color: white;
    }
    .card:hover{
        transform: translateY(-10px);
    }
</style>
<body>
    <div class="section">
        <h2>My Services</h2>
        <div class="container">
            <div class="card">
                <h3>Web Design</h3>
                <p>Beautiful & Modern Designs</p>
            </div>
            <div class="card">
                <h3>Frontend</h3>
                <p>Clean & Responsive UI</p>
            </div>
            <div class="card">
                <h3>Learning</h3>
                <p>Growing Every single day</p>
            </div>
        </div>
    </div>
</body>
</html>
