<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
        }
        .sidebar {
            width: 200px;
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .sidebar h2 {
            margin-bottom: 20px;
        }
        sidebar p {
            margin: 10px 0;
            cursor: pointer;
        }
        .sidebar p:hover {
            color: #38bdf8;
        }
        .main {
            flex: 1;
            padding: 20px;
            background: #f1f5f9;
        }
        .card {
            padding: 20px;
            background: white;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Palak</h2>
        <p>Dashboard</p>
        <p>Projects</p>
        <p>Settings</p>
    </div>
    <div class="main">
        <h1>Welcome</h1>
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</body>
</html>
