<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(to right,#0f172a,#1e293b);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .form-box {
        background: white;
        padding: 30px;
        width: 300px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    h2 {
        margin-bottom: 20px;
    }
    input {
        width: 90%;
        padding: 10px;
        margin: 10px auto;
        border-radius: 8px;
        border: 1px solid #ccc;
    }
    button {
        background: #38bdf8;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    button:hover {
        background: #0ea5e9;
    }
</style>
</head>
<body>
    <div class="form-box">
        <h2>Login</h2>
        <input type="text" placeholder="Enter username">
        <input type="password" placeholder="Enter password">
        <button>Login</button>
    </div>
</body>
</html>
