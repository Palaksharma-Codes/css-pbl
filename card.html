<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
</head>
<style>
    body {
        background-color:#282828;
        font-family: Arial, Helvetica, sans-serif;
    }
    .card {
        background-color: white;
        width: 300px;
        margin:100px auto;
        padding: 20px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    img {
        width: 300px;
        border-radius: 50%;
    }
    h1 {
        color: #333;
    }
    p {
        color: #555;
    }
    .btn{
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background-color: #007BFF;
        color: white;
        text-decoration: none;
        border-radius: 8px;
    }
    .btn:hover {
        background-color: #0056b3;
    }
</style>
<body>
    <div class="card">
        <img src="My-image.jpeg" alt="palak">
        <h1>Palak Sharma</h1>
        <p>Future Full-Stack Developer</p>
        <p>Building Her Dream life</p>
        <a href="#" class="btn">Follow Me</a>
    </div>
</body>
</html>
