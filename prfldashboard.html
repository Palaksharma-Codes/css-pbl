<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        h2 {
            margin: 15px 0 5px;
        }
        p {
            color: #666;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .box h2 {
            margin: 0;
            color: #38bdf8;
        }
        .box span {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="Images/My-image.jpeg">
        <h2>Palak sharma</h2>
        <p>Future Full-Stack Developer</p>
        <div class="stats">
            <div class="box">
                <h2>26</h2>
                <span>Projects</span>
            </div>
            <div class="box">
                <h2>100%</h2>
                <span>Consistency</span>
            </div>
            <div class="box">
                <h2>Infinite</h2>
                <span>Growth</span>
            </div>
        </div>
    </div>
</body>
</html>
