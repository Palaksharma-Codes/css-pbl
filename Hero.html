<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
</head>
<style>
    body {
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
    }
    .hero {
        height: 100vh;
        background-color:#303030;
        color:white;
        display: flex;
        justify-content: center;
        align-items:center;
        text-align: center;
        background:linear-gradient(to right,#0f172a,#1e293b);
    }
    .btn {
        background-color:transparent;
        margin:5px;
        padding: 10px 20px;
        border:2px solid white;
        border-radius: 8px;
        color:white;
        cursor: pointer;
    }
    .btn:hover{
        transform:scale(1.05);
    }
</style>
<body>
    <div class="hero">
        <div>
        <h1>Hi, I'm Palak</h1>
        <p>Future Full-Stack Developer</p>
        <button class="btn">Start Journey</button>
        <button class="btn">Follow Me</button>
        </div>
    </div>
</body>
</html>
